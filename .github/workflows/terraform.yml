name: 'PROD CI/CD'

on:
 push:
  branches: [ "main" ]
  pull_request:

permissions:
 contents: read

env:
TF_VERSION: 1.6.6

jobs:
plan:
name: 'Terraform Plan'
runs-on: ubuntu-latest
environment: production

defaults:
  run:
    shell: bash
    working-directory: environments/prod   # ✅ important

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Setup Terraform
  uses: hashicorp/setup-terraform@v3
  with:
    terraform_version: ${{ env.TF_VERSION }}

  env:
    TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
    TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
    TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
    TF_VAR_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
    TF_VAR_region: ${{ secrets.OCI_REGION }}

- name: Terraform Init
  run: terraform init

- name: Terraform Format
  run: terraform fmt -check

- name: Terraform Validate
  run: terraform validate

- name: Terraform Plan
  run: terraform plan -out=tfplan -var-file="prod.tfvars"

- name: Upload Plan
  uses: actions/upload-artifact@v4
  with:
    name: tfplan
    path: environments/prod/tfplan   # ✅ correct path


apply:
name: 'Terraform Apply'
needs: plan
runs-on: ubuntu-latest
environment: production

defaults:
  run:
    shell: bash
    working-directory: environments/prod   # ✅ important

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Download Plan
  uses: actions/download-artifact@v4
  with:
    name: tfplan
    path: environments/prod   # ✅ correct path

- name: Setup Terraform
  uses: hashicorp/setup-terraform@v3
  with:
    terraform_version: ${{ env.TF_VERSION }}

- name: Terraform Init
  run: terraform init

- name: Terraform Apply
  run: terraform apply -auto-approve tfplan
